<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Conquistador</title>
    <style>
        body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#000; color:#fff; }
        .header { background:#b71c1c; padding:25px; text-align:center; border-bottom: 5px solid #ffcc00; }
        .header h1 { margin:0; font-size:28px; text-transform: uppercase; }
        .header p { margin:5px 0 0; font-size:16px; color: #ffcc00; font-weight: bold; }
        .container { padding:15px; display: flex; flex-direction: column; gap: 20px; }
        .card { background:#1a1a1a; border-radius:15px; overflow:hidden; display: flex; align-items: center; border: 1px solid #333; }
        .card img { width:120px; height:120px; object-fit:cover; border-right: 2px solid #b71c1c; }
        .card-content { padding:15px; flex-grow: 1; }
        .name { font-size:18px; font-weight:bold; color: #fff; text-transform: uppercase; }
        .price { color:#ffcc00; font-size:22px; font-weight: bold; margin-top:5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MENÙ COMPLETO – 12€</h1>
        <p>Primo + Secondo + Bibita inclusa</p>
    </div>
    <div class="container">
        <div class="card">
            <img src="LINK_PLANCHITAS">
            <div class="card-content"><div class="name">Planchitas</div><div class="price">25€</div></div>
        </div>
        <div class="card">
            <img src="LINK_PIQUE_MACHO">
            <div class="card-content"><div class="name">Pique Macho</div><div class="price">16€</div></div>
        </div>
        <div class="card">
            <img src="LINK_POLLO_BROASTER">
            <div class="card-content"><div class="name">Pollo Broaster</div><div class="price">13€</div></div>
        </div>
        <div class="card">
            <img src="LINK_POLLO_A_LA_CANASTA">
            <div class="card-content"><div class="name">Pollo a la Canasta</div><div class="price">13€</div></div>
        </div>
        <div class="card">
            <img src="LINK_CHURRASCO">
            <div class="card-content"><div class="name">Churrasco</div><div class="price">16€</div></div>
        </div>
        <div class="card">
            <img src="LINK_CHULETA_CON_CHOCLO">
            <div class="card-content"><div class="name">Chuleta con Choclo</div><div class="price">16€</div></div>
        </div>
        <div class="card">
            <img src="https://i.ibb.co/S4zgvdV/pato-dorado.png">
            <div class="card-content"><div class="name">Pato Dorado</div><div class="price">20€</div></div>
        </div>
    </div>
</body>
</html>
