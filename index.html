<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:#fff;
}

.header {
    background:#b71c1c;
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.sub {
    font-size:14px;
    margin-top:5px;
}

.container {
    padding:15px;
}

.card {
    background:#1c1c1c;
    border-radius:15px;
    margin-bottom:20px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.card img {
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content {
    padding:15px;
}

.name {
    font-size:20px;
    font-weight:bold;
}

.price {
    color:#ffcc00;
    font-size:18px;
    margin-top:5px;
}
</style>

</head>

<body>

<div class="header">
MENÙ COMPLETO – 12€
<div class="sub">Primo + Secondo + Bibita inclusa</div>
</div>

<div class="container">

<div class="card">
<img src="https://source.unsplash.com/400x300/?grilled-meat">
<div class="card-content">
<div class="name">Planchitas</div>
<div class="price">25€</div>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/400x300/?steak-fries">
<div class="card-content">
<div class="name">Pique Macho</div>
<div class="price">16€</div>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/400x300/?fried-chicken">
<div class="card-content">
<div class="name">Pollo Broaster</div>
<div class="price">13€</div>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/400x300/?crispy-chicken">
<div class="card-content">
<div class="name">Pollo a la Canasta</div>
<div class="price">13€</div>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/400x300/?steak">
<div class="card-content">
<div class="name">Churrasco</div>
<div class="price">16€</div>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/400x300/?pork-corn">
<div class="card-content">
<div class="name">Chuleta con Choclo</div>
<div class="price">16€</div>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/400x300/?roast-duck">
<div class="card-content">
<div class="name">Pato Dorado</div>
<div class="price">20€</div>
</div>
</div>

</div>

</body>
</html>
