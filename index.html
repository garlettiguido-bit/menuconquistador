<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Conquistador</title>
    <style>
        body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#000; color:#fff; }
        .header { background:#b71c1c; padding:25px; text-align:center; border-bottom: 5px solid #ffcc00; position: sticky; top: 0; z-index: 100; }
        .header h1 { margin:0; font-size:22px; text-transform: uppercase; letter-spacing: 1px; }
        .header p { margin:5px 0 0; font-size:14px; color: #ffcc00; font-weight: bold; }
        .container { padding:15px; display: flex; flex-direction: column; gap: 15px; }
        .card { background:#1a1a1a; border-radius:15px; overflow:hidden; display: flex; align-items: center; border: 1px solid #333; height: 110px; }
        .card img { width:110px; height:110px; object-fit:cover; border-right: 3px solid #b71c1c; }
        .card-content { padding:12px; flex-grow: 1; }
        .name { font-size:16px; font-weight:bold; text-transform: uppercase; color: #fff; }
        .price { color:#ffcc00; font-size:20px; font-weight: bold; margin-top:5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MENÙ CONQUISTADOR</h1>
        <p>MENÙ COMPLETO – 12€ (Primo + Secondo + Bibita)</p>
    </div>
    <div class="container">

        <div class="card">
            <img src="https://i.ibb.co/ZzLn4Scr/planchitas.png">
            <div class="card-content"><div class="name">Planchitas</div><div class="price">25€</div></div>
        </div>

        <div class="card">
            <img src="https://i.ibb.co/MxpF80nm/pique-macho.png">
            <div class="card-content"><div class="name">Pique Macho</div><div class="price">16€</div></div>
        </div>

        <div class="card">
            <img src="https://i.ibb.co/wrs9xsdf/pollo-broadster.png">
            <div class="card-content"><div class="name">Pollo Broaster</div><div class="price">13€</div></div>
        </div>

        <div class="card">
            <img src="https://i.ibb.co/nMXgt023/pollo-a-la-canasta.png">
            <div class="card-content"><div class="name">Pollo a la Canasta</div><div class="price">13€</div></div>
        </div>

        <div class="card">
            <img src="https://i.ibb.co/xqyM5nnr/churrasco.png">
            <div class="card-content"><div class="name">Churrasco</div><div class="price">16€</div></div>
        </div>

        <div class="card">
            <img src="https://i.ibb.co/yBPVCz6s/chuleta-con-choclo.png">
            <div class="card-content"><div class="name">Chuleta con Choclo</div><div class="price">16€</div></div>
        </div>

        <div class="card">
            <img src="https://i.ibb.co/FbGcQR9x/pato-dorado.png">
            <div class="card-content"><div class="name">Pato Dorado</div><div class="price">20€</div></div>
        </div>

    </div>
</body>
</html>
